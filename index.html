<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Widget2">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Widget2</title>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<link rel="icon" href="https://i.ibb.co/XxHR1rxG/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }

html, body { height: 100%; background: #000; color: #fff; overflow: hidden; }
body { position: relative; }

#setup-panel {
position: relative;
z-index: 10000;
padding: 15px;
border-bottom: 1px solid #222;
display: flex;
flex-direction: column;
gap: 10px;
background: #000;
}
#my-id-display {
color: #888;
font-size: 14px;
word-break: break-all;
user-select: all;
-webkit-user-select: all;
cursor: pointer;
}
#peer-id-input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; font-size: 16px; outline: none; }
#connect-btn { background: #fff; color: #000; border: none; padding: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }

#status-dot {
position: fixed;
top: 12px;
left: 12px;
width: 10px;
height: 10px;
border-radius: 50%;
z-index: 10002;
opacity: 0;
transition: opacity 0.6s ease, background-color 0.3s ease;
pointer-events: none;
}
#status-dot.dot-red   { background: #ff4444; opacity: 1; }
#status-dot.dot-green { background: #00e676; opacity: 1; }

#chat-area {
position: absolute;
top: 140px;
left: 0;
right: 0;
bottom: 80px;
overflow-y: auto;
padding: 8px 0;
display: flex;
flex-direction: column;
gap: 2px;
font-size: 18px;
line-height: 1.4;
display: none;
}

.msg {
    overflow-wrap: break-word;
    word-break: break-word;
    font-size: 15px;
    padding: 6px 0;
    white-space: pre-wrap;
    color: #fff;
    position: relative;
    background-color: #000;
    line-height: 1.25;
    transition: background-color 0.4s ease;
}

.msg:not(.own-msg) {
    background-color: #111;
    padding: 6px 8px;
}

.msg.own-msg {
color: #777;
padding: 6px 8px;
}

.msg::before {
    display: none;
}

.msg-flash {
    background-color: #333 !important;
}

#input-area {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
min-height: 80px;
padding: 15px;
background: #000;
border-top: 1px solid #222;
z-index: 9999;
display: flex;
align-items: flex-end;
display: none;
}
#input-wrapper { display: flex; width: 100%; align-items: flex-end; }

#nick-input {
width: 70px;
min-width: 70px;
background: #111;
border: 1px solid #333;
color: #888;
padding: 13px 5px;
font-size: 16px;
outline: none;
text-align: center;
border-radius: 4px 0 0 4px;
border-right: none;
height: 50px;
}

#send-btn {
width: 50px;
min-width: 50px;
height: 50px;
background: #fff;
color: #000;
border: 1px solid #333;
border-radius: 0 4px 4px 0;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
transition: background 0.2s;
}

#send-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}

#message-input {
flex: 1;
background: #111;
border: 1px solid #333;
color: #fff;
padding: 13px 15px;
font-size: 16px;
outline: none;
border-radius: 0;
border-right: none;
resize: none;
height: 50px;
max-height: 150px;
font-family: 'Lexend', sans-serif;
line-height: 22px;
overflow-y: auto;
}
#message-input:disabled { opacity: 0.3; cursor: not-allowed; }

#nick-input:focus, #message-input:focus {
border: 2px solid #fff !important;
box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
z-index: 2;
}

/* --- YANIT ÖZELLİĞİ STİLLERİ --- */
.reply-container {
display: flex;
flex-direction: row;
align-items: stretch;
margin-bottom: 6px;
position: relative;
padding-left: 2px;
gap: 8px;
cursor: pointer;
}

.reply-line {
width: 2px;
background-color: #444;
border-radius: 2px;
flex-shrink: 0;
}

.reply-preview-text {
font-size: 12px;
color: #666;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
flex: 1;
display: flex;
align-items: center;
line-height: 1.4;
}

.msg-body {
cursor: pointer;
}

/* Reply-bar: typing-bar'ın tam üstüne biner, ayrı alan açmaz */
#reply-bar {
display: none;
background: #111;
border-top: 1px solid #222;
padding: 8px 15px;
font-size: 13px;
color: #888;
justify-content: space-between;
align-items: center;
position: fixed;
width: 100%;
z-index: 10001;
}
#cancel-reply-btn {
cursor: pointer;
color: #fff;
font-weight: bold;
padding: 0 5px;
}

.reply-nick-badge {
background-color: #fff;
color: #000;
font-weight: 700;
font-size: 10px;
padding: 2px 6px;
border-radius: 3px;
margin-right: 8px;
display: inline-block;
line-height: 1;
flex-shrink: 0;
}

/* --- YENİ MESAJ YOLDA GÖSTERGESİ --- */
@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0.15; }
}

#typing-indicator {
display: none;
position: fixed;
left: 0;
width: 100%;
z-index: 9998;
height: 26px;
padding: 0 15px;
background: #000;
border-top: 1px solid #1a1a1a;
align-items: center;
pointer-events: none;
}

#typing-indicator span {
font-size: 12px;
color: #555;
opacity: 0;
transition: opacity 0.2s;
}

#typing-indicator span.visible {
opacity: 1;
animation: blink 1.2s ease-in-out infinite;
}

/* --- FİZİKSEL KLAVYE / MASAÜSTÜ İÇİN GÖNDER BUTONUNU GİZLEME STİLİ --- */
@media (min-width: 769px) {
#send-btn {
display: none !important;
}
#message-input {
border-radius: 0 4px 4px 0 !important;
border-right: 1px solid #333 !important;
}
}

</style>
</head>
<body>

<div id="status-dot"></div>

<div id="setup-panel">
<div id="my-id-display">Bağlanılıyor...</div>
</div>

<div id="chat-area"></div>

<div id="typing-indicator"><span id="typing-text">Yeni mesaj yolda • • •</span></div>

<div id="reply-bar">
<span id="reply-bar-text">Yanıtlanıyor...</span>
<span id="cancel-reply-btn">✕</span>
</div>

<div id="input-area">
<div id="input-wrapper">
<input type="text" id="nick-input" placeholder="İsim" tabindex="1">
<textarea id="message-input" placeholder="Mesaj yaz" disabled tabindex="2"></textarea>
<button id="send-btn" disabled>➔</button>
</div>
</div>

<script>
const myIdDisplay = document.getElementById('my-id-display');
const statusDot = document.getElementById('status-dot');
const chatArea = document.getElementById('chat-area');
const nickInput = document.getElementById('nick-input');
const sendBtn = document.getElementById('send-btn');
const messageInput = document.getElementById('message-input');
const setupPanel = document.getElementById('setup-panel');
const inputArea = document.getElementById('input-area');
const typingIndicator = document.getElementById('typing-indicator');
const typingText = document.getElementById('typing-text');

const replyBar = document.getElementById('reply-bar');
const replyBarText = document.getElementById('reply-bar-text');
const cancelReplyBtn = document.getElementById('cancel-reply-btn');
let replyingTo = null;

let lastCancelTime = 0;
let lastSenderNick = null;

let typingTimeout = null;
let myTypingTimeout = null;
let isTypingSent = false;

const TYPING_BAR_HEIGHT = 26;

nickInput.addEventListener('focus', () => { nickInput.value = ''; });

let conn = null;
let pingInterval = null;
let missedPings = 0;

// --- SABİT ODA KİMLİKLERİ: her açılışta otomatik eşleşme, kod kopyalama yok ---
const ROOM_ID_A = 'w2room-9f3k2-a';
const ROOM_ID_B = 'w2room-9f3k2-b';

let peer = null;
let isHost = false;
let reconnectInterval = null;
let dotFadeTimeout = null;

function showStatusDot(state) {
if (dotFadeTimeout) { clearTimeout(dotFadeTimeout); dotFadeTimeout = null; }
statusDot.classList.remove('dot-red', 'dot-green');
statusDot.classList.add(state === 'green' ? 'dot-green' : 'dot-red');
statusDot.style.opacity = '1';

if (state === 'green') {
dotFadeTimeout = setTimeout(() => {
statusDot.style.opacity = '0';
}, 5000);
}
}

function connectToHost() {
if (conn && conn.open) return;
conn = peer.connect(ROOM_ID_A);
setupConnectionHandlers();
}

function startPeer() {
peer = new Peer(ROOM_ID_A);

peer.on('open', () => { isHost = true; });

peer.on('connection', (incomingConn) => {
conn = incomingConn;
setupConnectionHandlers();
});

peer.on('error', (err) => {
if (err.type === 'unavailable-id') {
isHost = false;
peer = new Peer(ROOM_ID_B);
peer.on('open', () => { connectToHost(); });
peer.on('connection', (incomingConn) => {
conn = incomingConn;
setupConnectionHandlers();
});
}
});
}

startPeer();

function showTypingIndicator() {
typingText.classList.add('visible');
if (typingTimeout) clearTimeout(typingTimeout);
typingTimeout = setTimeout(hideTypingIndicator, 4000);
}

function hideTypingIndicator() {
if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
typingText.classList.remove('visible');
}

function setupConnectionHandlers() {
conn.on('open', () => {
if (reconnectInterval) { clearInterval(reconnectInterval); reconnectInterval = null; }
showStatusDot('green');

chatArea.style.display = 'flex';
inputArea.style.display = 'flex';
typingIndicator.style.display = 'flex';
setupPanel.style.display = 'none';
chatArea.style.top = '0px';

messageInput.disabled = false;
sendBtn.disabled = false;
messageInput.placeholder = "Yazın...";
messageInput.focus();

missedPings = 0;
if (pingInterval) clearInterval(pingInterval);
pingInterval = setInterval(() => {
if (conn && conn.open) {
conn.send({ type: 'ping' });
missedPings++;
if (missedPings > 3) { conn.close(); handleDisconnect(); }
}
}, 2000);

adjustInputHeight();
setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 100);
});

conn.on('data', (data) => {
if (data.type === 'ping') { missedPings = 0; if (conn && conn.open) conn.send({ type: 'pong' }); return; }
if (data.type === 'pong') { missedPings = 0; return; }
if (data.type === 'typing') { showTypingIndicator(); return; }
if (data.type === 'typing-stop') { hideTypingIndicator(); return; }

hideTypingIndicator();
appendMessage(data.text, data.senderNick, false, data.reply, data.msgId);
});

conn.on('close', handleDisconnect);
}

function handleDisconnect() {
if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
hideTypingIndicator();
showStatusDot('red');

// Sohbet ekranı açık kalır, mesaj geçmişi silinmez, siteyi üstümüze kapatmaz.
// Sadece istemci taraf (host olmayan) periyodik olarak yeniden bağlanmayı dener.
if (!isHost && !reconnectInterval) {
reconnectInterval = setInterval(() => {
if (!conn || !conn.open) {
connectToHost();
}
}, 3000);
}
}

function appendMessage(text, senderNick, isOwnMessage, replyData = null, customId = null) {
const msgDiv = document.createElement('div');
msgDiv.className = 'msg';
const messageId = customId || 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
msgDiv.id = messageId;

if (isOwnMessage) msgDiv.classList.add('own-msg');

let finalNick = (senderNick && senderNick.trim() !== '') ? senderNick.trim() : '';
let chosenColor = null;

if (finalNick.length >= 2 && finalNick.charAt(1) === '.') {
const colorPrefix = finalNick.charAt(0).toLowerCase();
const colorMap = {
'r': '#ff4444',
'g': '#00e676',
'b': '#29b6f6',
'y': '#ffee55',
'p': '#f475ff',
'o': '#ffa726',
'v': '#ab47bc',
'c': '#00e5ff',
'w': '#ffffff'
};
if (colorMap[colorPrefix]) {
chosenColor = colorMap[colorPrefix];
finalNick = finalNick.substring(2);
}
}

if (replyData) {
const replyContainer = document.createElement('div');
replyContainer.className = 'reply-container';
const replyLine = document.createElement('div');
replyLine.className = 'reply-line';
const replyPreview = document.createElement('div');
replyPreview.className = 'reply-preview-text';

if (replyData.nick && replyData.nick.trim() !== '') {
let cleanReplyNick = replyData.nick.trim();
if (cleanReplyNick.length >= 2 && cleanReplyNick.charAt(1) === '.') cleanReplyNick = cleanReplyNick.substring(2);
const badgeSpan = document.createElement('span');
badgeSpan.className = 'reply-nick-badge';
badgeSpan.innerText = cleanReplyNick;
const textSpan = document.createElement('span');
textSpan.innerText = replyData.text;
replyPreview.appendChild(badgeSpan);
replyPreview.appendChild(textSpan);
} else {
replyPreview.innerText = replyData.text;
}

replyContainer.appendChild(replyLine);
replyContainer.appendChild(replyPreview);

if (replyData.targetId) {
replyContainer.addEventListener('click', (e) => {
e.stopPropagation();
const targetMsg = document.getElementById(replyData.targetId);
if (targetMsg) {
targetMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
targetMsg.classList.add('msg-flash');
setTimeout(() => targetMsg.classList.remove('msg-flash'), 800);
}
});
}

msgDiv.appendChild(replyContainer);
lastSenderNick = null;
}

if (finalNick !== '' && finalNick !== lastSenderNick) {
const nickDiv = document.createElement('div');
nickDiv.style.fontWeight = '700';
nickDiv.style.fontSize = '13px';
nickDiv.style.marginBottom = '2px';

if (chosenColor) {
nickDiv.style.color = chosenColor;
} else {
if (finalNick.toLowerCase() === 'piar') nickDiv.style.color = '#00e5ff';
else if (finalNick.toLowerCase() === 'sistem') nickDiv.style.color = '#ff0000';
else if (finalNick.toLowerCase() === 'bless') nickDiv.style.color = '#f475ff';
else nickDiv.style.color = '#ccc';
}

nickDiv.innerText = finalNick;
msgDiv.appendChild(nickDiv);
lastSenderNick = finalNick;
} else if (finalNick === '') {
lastSenderNick = null;
}

const textDiv = document.createElement('div');
textDiv.className = 'msg-body';
textDiv.innerHTML = text.replace(/**(.*?)**/g, '<b>$`1</b>');

textDiv.addEventListener('click', () => {
if (Date.now() - lastCancelTime < 300) return;
const activeNick = (senderNick && senderNick.trim() !== '') ? senderNick : '';
replyingTo = { text: text, nick: activeNick, targetId: messageId };
replyBarText.innerText = finalNick
? ``${finalNick} kullanıcısına yanıt veriliyor...:Mesaja yanıt veriliyor...`;
replyBar.style.display = 'flex';
adjustInputHeight();
messageInput.focus();
});

msgDiv.appendChild(textDiv);
chatArea.appendChild(msgDiv);

while (chatArea.getElementsByClassName('msg').length > 200) {
chatArea.removeChild(chatArea.getElementsByClassName('msg')[0]);
}

setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 30);
return messageId;
}

function adjustInputHeight() {
messageInput.style.height = '50px';
if (messageInput.scrollHeight > 50) {
messageInput.style.height = Math.min(150, messageInput.scrollHeight) + 'px';
}

const inputAreaHeight = inputArea.offsetHeight;
const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
const keyboardHeight = window.innerHeight - viewportHeight;

typingIndicator.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';

if (replyingTo) {
replyBar.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';
}

chatArea.style.bottom = (keyboardHeight + inputAreaHeight + TYPING_BAR_HEIGHT) + 'px';
chatArea.scrollTop = chatArea.scrollHeight;
}

messageInput.addEventListener('input', () => {
adjustInputHeight();
if (conn && conn.open) {
if (!isTypingSent) { conn.send({ type: 'typing' }); isTypingSent = true; }
if (myTypingTimeout) clearTimeout(myTypingTimeout);
myTypingTimeout = setTimeout(() => {
if (conn && conn.open) conn.send({ type: 'typing-stop' });
isTypingSent = false;
}, 2000);
}
});

function closeReplyBar() {
replyingTo = null;
replyBar.style.display = 'none';
adjustInputHeight();
}

cancelReplyBtn.addEventListener('pointerdown', (event) => {
event.preventDefault();
event.stopPropagation();
event.stopImmediatePropagation();
lastCancelTime = Date.now();
closeReplyBar();
setTimeout(() => { messageInput.focus(); }, 10);
});

function sendMessage() {
const textToSend = messageInput.value.trim();
const currentNick = nickInput.value.trim();

if (textToSend !== '') {
if (myTypingTimeout) clearTimeout(myTypingTimeout);
if (conn && conn.open && isTypingSent) conn.send({ type: 'typing-stop' });
isTypingSent = false;

const myMsgId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
const messageData = { text: textToSend, senderNick: currentNick, reply: replyingTo, msgId: myMsgId };

if (conn && conn.open) conn.send(messageData);
appendMessage(textToSend, currentNick, true, replyingTo, myMsgId);
closeReplyBar();
messageInput.value = '';
adjustInputHeight();
}
}

sendBtn.addEventListener('pointerdown', (event) => {
event.preventDefault();
sendMessage();
setTimeout(() => { messageInput.focus(); }, 10);
});

/* --- GÜNCELLENEN KEYDOWN EVENTİ: FİZİKSEL KLAVYE & SQUASHING ENTER --- */
messageInput.addEventListener('keydown', (event) => {
if (event.key === 'Enter') {
// Shift tuşuna basılıyorsa her koşulda alt satıra geçmesine izin ver
if (event.shiftKey) return;

// Hem dokunmatik destekli hem de dar ekranlı (mobil sanal klavye) kontrolü
const isMobileVirtualKeyboard = ('ontouchstart' in window) && (window.innerWidth <= 768);

if (isMobileVirtualKeyboard) {
// Sadece telefon/tablet sanal klavyesiyse Enter varsayılan işlevini (alt satır) yapsın
return;
}

// Masaüstünde veya fiziksel klavyeli tablette Enter doğrudan mesajı gönderir
event.preventDefault();
sendMessage();
}
});

document.addEventListener('keydown', (event) => {
if (event.key === 'Tab') {
if (messageInput.disabled) return;
const activeElement = document.activeElement;
if (event.shiftKey) {
if (activeElement === nickInput) { event.preventDefault(); messageInput.focus(); }
} else {
if (activeElement === messageInput) { event.preventDefault(); nickInput.focus(); }
}
}
});

if (window.visualViewport) {
window.visualViewport.addEventListener('resize', adjustInputHeight);
}
</script>
</body>
</html>
