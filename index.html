<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Widget2">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Widget2</title>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<link rel="icon" href="https://i.ibb.co/XxHR1rxG/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }

html, body { height: 100%; background: #000; color: #fff; overflow: hidden; }
body { position: relative; }

#setup-panel {
position: relative;
z-index: 10000;
padding: 15px;
border-bottom: 1px solid #222;
display: flex;
flex-direction: column;
gap: 10px;
background: #000;
}
#my-id-display {
color: #888;
font-size: 14px;
word-break: break-all;
user-select: all;
-webkit-user-select: all;
cursor: pointer;
}
#peer-id-input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; font-size: 16px; outline: none; }
#connect-btn { background: #fff; color: #000; border: none; padding: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }

#chat-area {
position: absolute;
top: 140px;
left: 0;
right: 0;
bottom: 80px;
overflow-y: auto;
padding: 8px 0;
display: flex;
flex-direction: column;
gap: 2px;
font-size: 18px;
line-height: 1.4;
display: none; 
}

.msg {
    overflow-wrap: break-word;
    word-break: break-word;
    font-size: 15px;
    padding: 6px 0;
    white-space: pre-wrap;
    color: #fff;
    position: relative;
    background-color: #000;
    line-height: 1.25;
}

/* Karşı taraf mesajları */
.msg:not(.own-msg) {
    background-color: #111;
    padding: 6px 8px;
}

/* Kendi mesajları */
.msg.own-msg {
color: #fff;
padding: 6px 8px;
}

.msg::before {
    display: none;
}

.msg.own-msg {
color: #777;
}

#input-area {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
min-height: 80px;
padding: 15px;
background: #000;
border-top: 1px solid #222;
z-index: 9999;
display: flex;
align-items: flex-end;
display: none; 
}
#input-wrapper { display: flex; width: 100%; align-items: flex-end; }

#nick-input {
width: 70px;
min-width: 70px;
background: #111;
border: 1px solid #333;
color: #888;
padding: 13px 5px;
font-size: 16px;
outline: none;
text-align: center;
border-radius: 4px 0 0 4px;
border-right: none;
height: 50px;
}

#send-btn {
width: 50px;
min-width: 50px;
height: 50px;
background: #fff;
color: #000;
border: 1px solid #333;
border-radius: 0 4px 4px 0;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
transition: background 0.2s;
}

#send-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}

#message-input {
flex: 1;
background: #111;
border: 1px solid #333;
color: #fff;
padding: 13px 15px;
font-size: 16px;
outline: none;
border-radius: 0;
border-right: none;
resize: none;
height: 50px;
max-height: 150px;
font-family: 'Lexend', sans-serif;
line-height: 22px;
overflow-y: auto;
}
#message-input:disabled { opacity: 0.3; cursor: not-allowed; }

#nick-input:focus, #message-input:focus {
border: 2px solid #fff !important;
box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
z-index: 2;
}

/* --- YANIT ÖZELLİĞİ STİLLERİ --- */
.reply-container {
display: flex;
flex-direction: row;       
align-items: stretch;      
margin-bottom: 6px;
position: relative;
padding-left: 2px;
gap: 8px;                  
}

.reply-line {
width: 2px;                
background-color: #444;    
border-radius: 2px;        
flex-shrink: 0;            
}

.reply-preview-text {
font-size: 12px;
color: #666;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
flex: 1;
display: flex;
align-items: center;
line-height: 1.4;
}

.msg-body {
cursor: pointer;
}

/* Giriş alanının üstündeki "Yanıtlanıyor" barı */
#reply-bar {
display: none;
background: #111;
border-top: 1px solid #222;
padding: 8px 15px;
font-size: 13px;
color: #888;
justify-content: space-between;
align-items: center;
position: fixed;
width: 100%;
z-index: 10000;
}
#cancel-reply-btn {
cursor: pointer;
color: #fff;
font-weight: bold;
padding: 0 5px;
}

/* Yanıtlanan Kişinin Şık Beyaz İsim Kutucuğu */
.reply-nick-badge {
background-color: #fff; 
color: #000; 
font-weight: 700; 
font-size: 10px; 
padding: 2px 6px; 
border-radius: 3px; 
margin-right: 8px; 
display: inline-block;
line-height: 1;
flex-shrink: 0;
}

</style>
</head>
<body>

<div id="setup-panel">
<div id="my-id-display">Kodunuz yükleniyor...</div>
<input type="text" id="peer-id-input" placeholder="Kodu buraya yapıştır">
<button id="connect-btn">Bağlan</button>
</div>

<div id="chat-area"></div>

<div id="reply-bar">
<span id="reply-bar-text">Yanıtlanıyor...</span>
<span id="cancel-reply-btn">✕</span>
</div>

<div id="input-area">
<div id="input-wrapper">
<input type="text" id="nick-input" placeholder="İsim" tabindex="1">
<textarea id="message-input" placeholder="Mesaj yaz" disabled tabindex="2"></textarea>
<button id="send-btn" disabled>➔</button>
</div>
</div>

<script>
const myIdDisplay = document.getElementById('my-id-display');
const peerIdInput = document.getElementById('peer-id-input');
const connectBtn = document.getElementById('connect-btn');
const chatArea = document.getElementById('chat-area');
const nickInput = document.getElementById('nick-input');
const sendBtn = document.getElementById('send-btn');
const messageInput = document.getElementById('message-input');
const setupPanel = document.getElementById('setup-panel');
const inputArea = document.getElementById('input-area'); 

const replyBar = document.getElementById('reply-bar');
const replyBarText = document.getElementById('reply-bar-text');
const cancelReplyBtn = document.getElementById('cancel-reply-btn');
let replyingTo = null; 

// En son mesaj atan kişiyi hafızada tutan dikey akış kontrol değişkeni
let lastSenderNick = null;

nickInput.addEventListener('focus', () => {
nickInput.value = '';
});

let conn = null;
let pingInterval = null; 
let missedPings = 0; 

myIdDisplay.addEventListener('click', () => {
    const idText = myIdDisplay.innerText;
    if (idText === "Kodunuz yükleniyor..." || idText === "Kopyalandı!") return;
    
    navigator.clipboard.writeText(idText).then(() => {
        myIdDisplay.innerText = "Kopyalandı!";
        myIdDisplay.style.color = "#fff";
        
        setTimeout(() => {
            myIdDisplay.innerText = idText;
            myIdDisplay.style.color = "#888";
        }, 2000);
    });
});

const peer = new Peer();

peer.on('open', (id) => {
myIdDisplay.innerText = id;
});

connectBtn.addEventListener('click', () => {
const friendId = peerIdInput.value.trim();
if (friendId) {
conn = peer.connect(friendId);
setupConnectionHandlers();
}
});

peer.on('connection', (incomingConn) => {
conn = incomingConn;
setupConnectionHandlers();
});

function setupConnectionHandlers() {
conn.on('open', () => {
chatArea.style.display = 'flex';
inputArea.style.display = 'flex';
setupPanel.style.display = 'none';
chatArea.style.top = '0px';

messageInput.disabled = false;
sendBtn.disabled = false;
messageInput.placeholder = "Yazın...";
messageInput.focus();

missedPings = 0;
if(pingInterval) clearInterval(pingInterval);

pingInterval = setInterval(() => {
if (conn && conn.open) {
conn.send({ type: 'ping' });
missedPings++;

if (missedPings > 3) {
resetToMainMenu(); 
}
}
}, 2000);

setTimeout(() => {
chatArea.scrollTop = chatArea.scrollHeight;
}, 100);
});

conn.on('data', (data) => {
if (data.type === 'ping') {
missedPings = 0; 
if(conn && conn.open) conn.send({ type: 'pong' }); 
return;
}
if (data.type === 'pong') {
missedPings = 0; 
return;
}

appendMessage(data.text, data.senderNick, false, data.reply);
});

conn.on('close', () => {
resetToMainMenu();
});
} 

function resetToMainMenu() {
if(pingInterval) {
clearInterval(pingInterval);
pingInterval = null;
}

setupPanel.style.display = 'flex';
chatArea.style.display = 'none'; 
inputArea.style.display = 'none'; 
replyBar.style.display = 'none';
replyingTo = null;
lastSenderNick = null; // Ana ekrana dönünce isim geçmişini temizle
messageInput.disabled = true;
sendBtn.disabled = true;
messageInput.value = '';
peerIdInput.value = '';

chatArea.innerHTML = '';

alert("Bağlantı koptu. Giriş ekranına yönlendiriliyorsunuz.");
}

function appendMessage(text, senderNick, isOwnMessage, replyData = null) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg';

    if (isOwnMessage) {
        msgDiv.classList.add('own-msg');
    }

    // Yanıt barı mekanizması
    if (replyData) {
        const replyContainer = document.createElement('div');
        replyContainer.className = 'reply-container';
        
        const replyLine = document.createElement('div');
        replyLine.className = 'reply-line';
        
        const replyPreview = document.createElement('div');
        replyPreview.className = 'reply-preview-text';
        
        if (replyData.nick && replyData.nick.trim() !== '') {
            const badgeSpan = document.createElement('span');
            badgeSpan.className = 'reply-nick-badge';
            badgeSpan.innerText = replyData.nick;
            
            const textSpan = document.createElement('span');
            textSpan.innerText = replyData.text;
            
            replyPreview.appendChild(badgeSpan);
            replyPreview.appendChild(textSpan);
        } else {
            replyPreview.innerText = replyData.text;
        }
        
        replyContainer.appendChild(replyLine);
        replyContainer.appendChild(replyPreview);
        msgDiv.appendChild(replyContainer);
        
        // ÖNEMLİ: Eğer mesaja bir yanıt girerse akış kesildiği için bir sonraki mesajda isim zorunlu basılmalı
        lastSenderNick = null;
    }

    // Temizlenmiş ve normallere indirgenmiş isim kontrolü
    const currentNickClean = (senderNick && senderNick.trim() !== '') ? senderNick.trim() : '';

    // Eğer üst üste gelen isim bir öncekiyle AYNI DEĞİLSE veya ilk defa mesaj atılıyorsa ismi yazdır
    if (currentNickClean !== '' && currentNickClean !== lastSenderNick) {
        const nickDiv = document.createElement('div');
        nickDiv.style.fontWeight = '700';

        if (currentNickClean.toLowerCase() === 'piar') {
            nickDiv.style.color = '#00e5ff';
        } else if (currentNickClean.toLowerCase() === 'sistem') {
            nickDiv.style.color = '#ff0000';
        } else if (currentNickClean.toLowerCase() === 'bless') {
            nickDiv.style.color = '#f475ff';
        } else {
            nickDiv.style.color = '#ccc';
        }

        nickDiv.style.fontSize = '13px';
        nickDiv.style.marginBottom = '2px';
        nickDiv.innerText = senderNick; // Orijinal halini bastır
        msgDiv.appendChild(nickDiv);
        
        // Son yazan kişiyi hafızaya al
        lastSenderNick = currentNickClean;
    } else if (currentNickClean === '') {
        // Eğer isim gönderilmediyse (isimsizse) hafızayı sıfırlıyoruz ki düzen kaymasın
        lastSenderNick = null;
    }

    const textDiv = document.createElement('div');
    textDiv.className = 'msg-body';
    textDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    
    textDiv.addEventListener('click', () => {
        const activeNick = (senderNick && senderNick.trim() !== '') ? senderNick : '';
        replyingTo = { text: text, nick: activeNick };
        
        if (activeNick) {
            replyBarText.innerText = `${replyingTo.nick} kullanıcısına yanıt veriliyor...`;
        } else {
            replyBarText.innerText = `Mesaja yanıt veriliyor...`;
        }
        
        replyBar.style.display = 'flex';
        adjustInputHeight();
        messageInput.focus();
    });
    
    msgDiv.appendChild(textDiv);
    chatArea.appendChild(msgDiv);

    while (chatArea.getElementsByClassName('msg').length > 200) {
        chatArea.removeChild(chatArea.getElementsByClassName('msg')[0]);
    }

    setTimeout(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
    }, 30);
}

function adjustInputHeight() {
    messageInput.style.height = '50px';

    if (messageInput.scrollHeight > 50) {
        const newHeight = Math.min(150, messageInput.scrollHeight);
        messageInput.style.height = newHeight + 'px';
    }

    const inputAreaHeight = inputArea.offsetHeight;
    const replyBarHeight = replyingTo ? replyBar.offsetHeight : 0;
    const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const keyboardHeight = window.innerHeight - viewportHeight;

    if (replyingTo) {
        replyBar.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';
    }

    chatArea.style.bottom = (keyboardHeight + inputAreaHeight + replyBarHeight) + 'px';
    chatArea.scrollTop = chatArea.scrollHeight;
}

messageInput.addEventListener('input', adjustInputHeight);

function closeReplyBar() {
    replyingTo = null;
    replyBar.style.display = 'none';
    adjustInputHeight();
}

cancelReplyBtn.addEventListener('click', closeReplyBar);

function sendMessage() {
    const textToSend = messageInput.value.trim();
    const currentNick = nickInput.value.trim();

    if (textToSend !== '') {
        const messageData = {
            text: textToSend,
            senderNick: currentNick,
            reply: replyingTo 
        };

        if (conn && conn.open) {
            conn.send(messageData);
        }

        appendMessage(textToSend, currentNick, true, replyingTo);
        closeReplyBar();
        messageInput.value = '';
        adjustInputHeight();
    }
}

sendBtn.addEventListener('pointerdown', (event) => {
event.preventDefault(); 
sendMessage();
setTimeout(() => { messageInput.focus(); }, 10);
});

messageInput.addEventListener('keydown', (event) => {
if (event.key === 'Enter') {
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

if (isMobile) {
return; 
} else {
if (event.shiftKey) {
return;
} else {
event.preventDefault();
sendMessage();
}
}
}
});

document.addEventListener('keydown', (event) => {
if (event.key === 'Tab') {
if (messageInput.disabled) return;

const activeElement = document.activeElement;

if (event.shiftKey) {
if (activeElement === nickInput) {
event.preventDefault();
messageInput.focus();
}
} else {
if (activeElement === messageInput) {
event.preventDefault();
nickInput.focus();
}
}
}
});

if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        const viewportHeight = window.visualViewport.height;
        const windowHeight = window.innerHeight;
        const keyboardHeight = windowHeight - viewportHeight;

        const inputAreaHeight = inputArea.offsetHeight;
        const replyBarHeight = replyingTo ? replyBar.offsetHeight : 0;

        if (keyboardHeight > 0) {
            inputArea.style.bottom = keyboardHeight + 'px';
            if (replyingTo) replyBar.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';
            chatArea.style.bottom = (keyboardHeight + inputAreaHeight + replyBarHeight) + 'px';
        } else {
            inputArea.style.bottom = '0px';
            if (replyingTo) replyBar.style.bottom = inputAreaHeight + 'px';
            chatArea.style.bottom = (inputAreaHeight + replyBarHeight) + 'px';
        }

        setTimeout(() => {
            chatArea.scrollTop = chatArea.scrollHeight;
        }, 30);
    });
}
</script>
</body>
</html>
