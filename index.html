<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Widget2</title>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<link rel="icon" href="https://i.ibb.co/XxHR1rxG/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }
html, body { height: 100%; background: #000; color: #fff; overflow: hidden; position: relative; }
#status-dot { position: fixed; top: 12px; left: 12px; width: 10px; height: 10px; border-radius: 50%; z-index: 10002; opacity: 1; background: #ff4444; transition: opacity 0.6s ease; pointer-events: none; }
#setup-panel { position: relative; z-index: 10000; padding: 15px; border-bottom: 1px solid #222; background: #000; text-align: center; font-size: 14px; color: #888; }
#chat-area { position: absolute; top: 50px; left: 0; right: 0; bottom: 80px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; font-size: 18px; line-height: 1.4; }
.msg { overflow-wrap: break-word; word-break: break-word; font-size: 15px; padding: 6px 8px; white-space: pre-wrap; color: #fff; background-color: #111; }
.msg.own-msg { color: #777; background-color: #000; }
.msg-flash { background-color: #333 !important; }
#input-area { position: fixed; bottom: 0; left: 0; width: 100%; min-height: 80px; padding: 15px; background: #000; border-top: 1px solid #222; z-index: 9999; display: flex; align-items: flex-end; }
#input-wrapper { display: flex; width: 100%; align-items: flex-end; }
#nick-input { width: 70px; min-width: 70px; background: #111; border: 1px solid #333; color: #888; padding: 13px 5px; font-size: 16px; outline: none; text-align: center; border-radius: 4px 0 0 4px; border-right: none; height: 50px; }
#send-btn { width: 50px; min-width: 50px; height: 50px; background: #fff; color: #000; border: 1px solid #333; border-radius: 0 4px 4px 0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
#message-input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 13px 15px; font-size: 16px; outline: none; resize: none; height: 50px; max-height: 150px; line-height: 22px; overflow-y: auto; }
.reply-container { display: flex; margin-bottom: 6px; gap: 8px; cursor: pointer; }
.reply-line { width: 2px; background-color: #444; flex-shrink: 0; }
.reply-preview-text { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#reply-bar { display: none; background: #111; border-top: 1px solid #222; padding: 8px 15px; font-size: 13px; color: #888; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 10001; }
#cancel-reply-btn { cursor: pointer; color: #fff; font-weight: bold; }
.reply-nick-badge { background-color: #fff; color: #000; font-weight: 700; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-right: 8px; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
#typing-indicator { display: none; position: fixed; left: 0; width: 100%; z-index: 9998; height: 26px; padding: 0 15px; background: #000; border-top: 1px solid #1a1a1a; align-items: center; }
#typing-indicator span { font-size: 12px; color: #555; opacity: 0; }
#typing-indicator span.visible { opacity: 1; animation: blink 1.2s ease-in-out infinite; }
@media (min-width: 769px) { #send-btn { display: none !important; } #message-input { border-radius: 0 4px 4px 0 !important; border-right: 1px solid #333 !important; } }
</style>
</head>
<body>
<div id="status-dot"></div>
<div id="setup-panel"><div id="my-id-display">Sistem Aktif • Bağlantı Aranıyor...</div></div>
<div id="chat-area"></div>
<div id="typing-indicator"><span id="typing-text">Yeni mesaj yolda • • •</span></div>
<div id="reply-bar"><span id="reply-bar-text">Yanıtlanıyor...</span><span id="cancel-reply-btn">✕</span></div>
<div id="input-area">
<div id="input-wrapper">
<input type="text" id="nick-input" placeholder="İsim" tabindex="1">
<textarea id="message-input" placeholder="Bağlanıyor..." disabled tabindex="2"></textarea>
<button id="send-btn" disabled>➔</button>
</div>
</div>
<script>
const myIdDisplay = document.getElementById('my-id-display');
const statusDot = document.getElementById('status-dot');
const chatArea = document.getElementById('chat-area');
const nickInput = document.getElementById('nick-input');
const sendBtn = document.getElementById('send-btn');
const messageInput = document.getElementById('message-input');
const setupPanel = document.getElementById('setup-panel');
const inputArea = document.getElementById('input-area');
const typingIndicator = document.getElementById('typing-indicator');
const typingText = document.getElementById('typing-text');
const replyBar = document.getElementById('reply-bar');
const replyBarText = document.getElementById('reply-bar-text');
const cancelReplyBtn = document.getElementById('cancel-reply-btn');

let conn = null, peer = null, replyingTo = null;
let lastCancelTime = 0, lastSenderNick = null, typingTimeout = null, myTypingTimeout = null, isTypingSent = false;
const TYPING_BAR_HEIGHT = 26;

// Sabit anahtarlar (Kilitlenmeyi önlemek için dinamik rol dağılımı yapıyoruz)
const BASE_ID = "w2-fixedroom-2026";
const ID_A = BASE_ID + "-A";
const ID_B = BASE_ID + "-B";
let currentRole = null, dotFadeTimeout = null, retryTimer = null;

nickInput.addEventListener('focus', () => { nickInput.value = ''; });

function setDot(color) {
    if (dotFadeTimeout) clearTimeout(dotFadeTimeout);
    statusDot.style.opacity = "1";
    statusDot.style.background = color === "green" ? "#00e676" : "#ff4444";
    if (color === "green") {
        dotFadeTimeout = setTimeout(() => { statusDot.style.opacity = "0"; }, 5000);
    }
}

function startEngine() {
    setDot("red");
    // Önce şansımızı A rolü (Oda sahibi) olarak deniyoruz
    peer = new Peer(ID_A);
    
    peer.on('open', () => {
        currentRole = "A";
        myIdDisplay.innerText = "Oda Kuruldu. Arkadaşınızın girmesi bekleniyor...";
    });

    peer.on('connection', (incoming) => {
        if (conn) conn.close();
        conn = incoming;
        bindEvents();
    });

    peer.on('error', (err) => {
        // Eğer A rolü doluysa, sistem otomatik olarak B rolüne (Katılımcı) geçer
        if (err.type === 'unavailable-id') {
            peer.destroy();
            currentRole = "B";
            myIdDisplay.innerText = "Odaya bağlanılıyor...";
            connectAsClient();
        } else {
            loopReconnect();
        }
    });
}

function connectAsClient() {
    peer = new Peer(ID_B);
    peer.on('open', () => {
        let tryConn = () => {
            if (conn && conn.open) return;
            conn = peer.connect(ID_A, { reliable: true });
            
            let t = setTimeout(() => { if (!conn || !conn.open) tryConn(); }, 3000);
            
            conn.on('open', () => { clearTimeout(t); bindEvents(); });
            conn.on('error', () => { clearTimeout(t); });
        };
        tryConn();
    });
    peer.on('error', () => { loopReconnect(); });
}

function bindEvents() {
    if (retryTimer) clearInterval(retryTimer);
    setDot("green");
    myIdDisplay.innerText = "Bağlantı Başarılı!";
    messageInput.disabled = false;
    sendBtn.disabled = false;
    messageInput.placeholder = "Mesaj yaz...";
    
    conn.on('data', (data) => {
        if (data.type === 'ping') { if (conn && conn.open) conn.send({ type: 'pong' }); return; }
        if (data.type === 'pong') return;
        if (data.type === 'typing') { typingText.classList.add('visible'); if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => typingText.classList.remove('visible'), 4000); return; }
        if (data.type === 'typing-stop') { typingText.classList.remove('visible'); return; }
        typingText.classList.remove('visible');
        appendMessage(data.text, data.senderNick, false, data.reply, data.msgId);
    });

    conn.on('close', () => { handleBreak(); });
    conn.on('error', () => { handleBreak(); });
}

function handleBreak() {
    setDot("red");
    messageInput.disabled = true;
    sendBtn.disabled = true;
    messageInput.placeholder = "Bağlantı koptu, yeniden bağlanılıyor...";
    loopReconnect();
}

function loopReconnect() {
    if (retryTimer) return;
    retryTimer = setInterval(() => {
        if (!conn || !conn.open) {
            if (currentRole === "B") {
                conn = peer.connect(ID_A, { reliable: true });
                conn.on('open', () => bindEvents());
            } else {
                startEngine();
            }
        }
    }, 4000);
}

function appendMessage(text, senderNick, isOwnMessage, replyData = null, customId = null) {
    const msgDiv = document.createElement('div');
    msgDiv.className = isOwnMessage ? 'msg own-msg' : 'msg';
    const messageId = customId || 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    msgDiv.id = messageId;
    let finalNick = senderNick ? senderNick.trim() : '';
    let chosenColor = null;

    if (finalNick.length >= 2 && finalNick.charAt(1) === '.') {
        const colorMap = { 'r': '#ff4444', 'g': '#00e676', 'b': '#29b6f6', 'y': '#ffee55', 'p': '#f475ff', 'o': '#ffa726', 'v': '#ab47bc', 'c': '#00e5ff', 'w': '#ffffff' };
        let prefix = finalNick.charAt(0).toLowerCase();
        if (colorMap[prefix]) { chosenColor = colorMap[prefix]; finalNick = finalNick.substring(2); }
    }

    if (replyData) {
        const replyContainer = document.createElement('div'); replyContainer.className = 'reply-container';
        const replyLine = document.createElement('div'); replyLine.className = 'reply-line';
        const replyPreview = document.createElement('div'); replyPreview.className = 'reply-preview-text';
        if (replyData.nick) {
            let n = replyData.nick.trim(); if (n.length >= 2 && n.charAt(1) === '.') n = n.substring(2);
            replyPreview.innerHTML = `<span class="reply-nick-badge">${n}</span>${replyData.text}`;
        } else { replyPreview.innerText = replyData.text; }
        replyContainer.appendChild(replyLine); replyContainer.appendChild(replyPreview);
        if (replyData.targetId) {
            replyContainer.addEventListener('click', (e) => {
                e.stopPropagation(); const target = document.getElementById(replyData.targetId);
                if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); target.classList.add('msg-flash'); setTimeout(() => target.classList.remove('msg-flash'), 800); }
            });
        }
        msgDiv.appendChild(replyContainer); lastSenderNick = null;
    }

    if (finalNick !== '' && finalNick !== lastSenderNick) {
        const nickDiv = document.createElement('div'); nickDiv.style = "font-weight:700; font-size:13px; margin-bottom:2px;";
        nickDiv.style.color = chosenColor || (['piar', 'sistem', 'bless'].includes(finalNick.toLowerCase()) ? (finalNick.toLowerCase() === 'piar' ? '#00e5ff' : finalNick.toLowerCase() === 'sistem' ? '#ff0000' : '#f475ff') : '#ccc');
        nickDiv.innerText = finalNick; msgDiv.appendChild(nickDiv); lastSenderNick = finalNick;
    } else if (!finalNick) { lastSenderNick = null; }

    const textDiv = document.createElement('div'); textDiv.className = 'msg-body'; textDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    textDiv.addEventListener('click', () => {
        if (Date.now() - lastCancelTime < 300) return;
        replyingTo = { text: text, nick: senderNick || '', targetId: messageId };
        replyBarText.innerText = finalNick ? `${finalNick} kullanıcısına yanıt veriliyor...` : "Mesaja yanıt veriliyor...";
        replyBar.style.display = 'flex'; adjustInputHeight(); messageInput.focus();
    });
    msgDiv.appendChild(textDiv); chatArea.appendChild(msgDiv);
    while (chatArea.children.length > 200) chatArea.removeChild(chatArea.firstChild);
    setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 30);
    return messageId;
}

function adjustInputHeight() {
    messageInput.style.height = '50px'; if (messageInput.scrollHeight > 50) messageInput.style.height = Math.min(150, messageInput.scrollHeight) + 'px';
    const h = inputArea.offsetHeight, vh = window.visualViewport ? window.visualViewport.height : window.innerHeight, kh = window.innerHeight - vh;
    typingIndicator.style.bottom = (kh + h) + 'px';
    if (replyingTo) replyBar.style.bottom = (kh + h) + 'px';
    chatArea.style.bottom = (kh + h + (replyingTo ? 35 : 0) + TYPING_BAR_HEIGHT) + 'px';
}

messageInput.addEventListener('input', () => {
    adjustInputHeight();
    if (conn && conn.open) {
        if (!isTypingSent) { conn.send({ type: 'typing' }); isTypingSent = true; }
        if (myTypingTimeout) clearTimeout(myTypingTimeout);
        myTypingTimeout = setTimeout(() => { if (conn && conn.open) conn.send({ type: 'typing-stop' }); isTypingSent = false; }, 2000);
    }
});

function closeReplyBar() { replyingTo = null; replyBar.style.display = 'none'; adjustInputHeight(); }
cancelReplyBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); lastCancelTime = Date.now(); closeReplyBar(); setTimeout(() => messageInput.focus(), 10); });

function sendMessage() {
    const txt = messageInput.value.trim(), nick = nickInput.value.trim();
    if (txt !== '') {
        if (myTypingTimeout) clearTimeout(myTypingTimeout);
        if (conn && conn.open && isTypingSent) conn.send({ type: 'typing-stop' });
        isTypingSent = false;
        const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        if (conn && conn.open) conn.send({ text: txt, senderNick: nick, reply: replyingTo, msgId: id });
        appendMessage(txt, nick, true, replyingTo, id); closeReplyBar(); messageInput.value = ''; adjustInputHeight();
    }
}

sendBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); sendMessage(); setTimeout(() => messageInput.focus(), 10); });
messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey && !(('ontouchstart' in window) && window.innerWidth <= 768)) { e.preventDefault(); sendMessage(); } });
if (window.visualViewport) window.visualViewport.addEventListener('resize', adjustInputHeight);

startEngine();
</script>
</body>
</html>
