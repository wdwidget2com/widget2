<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Widget2">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Widget2</title>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<link rel="icon" href="https://i.ibb.co/XxHR1rxG/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lexend', sans-serif; }

html, body { height: 100%; background: #000; color: #fff; overflow: hidden; }
body { position: relative; }

#setup-panel {
position: relative;
z-index: 10000;
padding: 15px;
border-bottom: 1px solid #222;
display: flex;
flex-direction: column;
gap: 10px;
background: #000;
}
#my-id-display {
color: #888;
font-size: 14px;
word-break: break-all;
user-select: all;
-webkit-user-select: all;
cursor: pointer;
}
#peer-id-input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; font-size: 16px; outline: none; }
#connect-btn { background: #fff; color: #000; border: none; padding: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }

#chat-area {
position: absolute;
top: 140px;
left: 0;
right: 0;
bottom: 80px;
overflow-y: auto;
padding: 8px 0;
display: flex;
flex-direction: column;
gap: 2px;
font-size: 18px;
line-height: 1.4;
display: none; 
}

.msg {
    overflow-wrap: break-word;
    word-break: break-word;
    font-size: 15px; /* 18 -> 15 */
    padding: 6px 0; /* daha sıkışık */
    white-space: pre-wrap;
    color: #fff;
    position: relative;
    background-color: #000;
    line-height: 1.25;
}

/* Karşı taraf mesajları */
.msg:not(.own-msg) {
    background-color: #111;
    padding: 6px 8px;
}

/* Kendi mesajları */
.msg.own-msg {
color: #fff;
padding: 6px 8px;
}

/* Çizgiyi tamamen kaldırdık */
.msg::before {
    display: none;
}

.msg.own-msg {
color: #777;
}

#input-area {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
min-height: 80px;
padding: 15px;
background: #000;
border-top: 1px solid #222;
z-index: 9999;
display: flex;
align-items: flex-end;
display: none; 
}
#input-wrapper { display: flex; width: 100%; align-items: flex-end; }

#nick-input {
width: 70px;
min-width: 70px;
background: #111;
border: 1px solid #333;
color: #888;
padding: 13px 5px;
font-size: 16px;
outline: none;
text-align: center;
border-radius: 4px 0 0 4px;
border-right: none;
height: 50px;
}

#message-input {
flex: 1;
background: #111;
border: 1px solid #333;
color: #fff;
padding: 13px 15px;
font-size: 16px;
outline: none;
border-radius: 0 4px 4px 0;
resize: none;
height: 50px;
max-height: 150px;
font-family: 'Lexend', sans-serif;
line-height: 22px;
overflow-y: auto;
}
#message-input:disabled { opacity: 0.3; cursor: not-allowed; }

#nick-input:focus, #message-input:focus {
border: 2px solid #fff !important;
box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
z-index: 2;
}
</style>
</head>
<body>

<div id="setup-panel">
<div id="my-id-display">Kodunuz yükleniyor...</div>
<input type="text" id="peer-id-input" placeholder="Kodu buraya yapıştır">
<button id="connect-btn">Bağlan</button>
</div>

<div id="chat-area"></div>

<div id="input-area">
<div id="input-wrapper">
<input type="text" id="nick-input" placeholder="İsim" tabindex="1">
<textarea id="message-input" placeholder="Mesaj yaz" disabled tabindex="2"></textarea>
</div>
</div>

<script>
const myIdDisplay = document.getElementById('my-id-display');
const peerIdInput = document.getElementById('peer-id-input');
const connectBtn = document.getElementById('connect-btn');
const chatArea = document.getElementById('chat-area');
const nickInput = document.getElementById('nick-input');

nickInput.addEventListener('focus', () => {
nickInput.value = '';
});

const messageInput = document.getElementById('message-input');
const setupPanel = document.getElementById('setup-panel');
const inputArea = document.getElementById('input-area'); 

let conn = null;
let pingInterval = null; 
let missedPings = 0; 

// YENİ: Koda tıklandığında otomatik panoya kopyalama mantığı
myIdDisplay.addEventListener('click', () => {
    const idText = myIdDisplay.innerText;
    
    if (idText === "Kodunuz yükleniyor..." || idText === "Kopyalandı!") return;
    
    navigator.clipboard.writeText(idText).then(() => {
        myIdDisplay.innerText = "Kopyalandı!";
        myIdDisplay.style.color = "#fff"; // Belirgin olması için geçici olarak saf beyaz yapalım
        
        setTimeout(() => {
            myIdDisplay.innerText = idText;
            myIdDisplay.style.color = "#888"; // Eski sönük gri rengine geri döndür
        }, 2000);
    });
});

const peer = new Peer();

peer.on('open', (id) => {
myIdDisplay.innerText = id;
});

connectBtn.addEventListener('click', () => {
const friendId = peerIdInput.value.trim();
if (friendId) {
conn = peer.connect(friendId);
setupConnectionHandlers();
}
});

peer.on('connection', (incomingConn) => {
conn = incomingConn;
setupConnectionHandlers();
});

function setupConnectionHandlers() {
conn.on('open', () => {
chatArea.style.display = 'flex';
inputArea.style.display = 'flex';
setupPanel.style.display = 'none';
chatArea.style.top = '0px';

messageInput.disabled = false;
messageInput.placeholder = "Yazın...";
messageInput.focus();

missedPings = 0;
if(pingInterval) clearInterval(pingInterval);

pingInterval = setInterval(() => {
if (conn && conn.open) {
conn.send({ type: 'ping' });
missedPings++;

if (missedPings > 3) {
resetToMainMenu(); 
}
}
}, 2000);

setTimeout(() => {
chatArea.scrollTop = chatArea.scrollHeight;
}, 100);
});

conn.on('data', (data) => {
if (data.type === 'ping') {
missedPings = 0; 
if(conn && conn.open) conn.send({ type: 'pong' }); 
return;
}
if (data.type === 'pong') {
missedPings = 0; 
return;
}

appendMessage(data.text, data.senderNick, false);
});

conn.on('close', () => {
resetToMainMenu();
});
} 

function resetToMainMenu() {
if(pingInterval) {
clearInterval(pingInterval);
pingInterval = null;
}

setupPanel.style.display = 'flex';
chatArea.style.display = 'none'; 
inputArea.style.display = 'none'; 
messageInput.disabled = true;
messageInput.value = '';
peerIdInput.value = '';

chatArea.innerHTML = '';

alert("Bağlantı koptu. Giriş ekranına yönlendiriliyorsunuz.");
}

function appendMessage(text, senderNick, isOwnMessage) {
const msgDiv = document.createElement('div');
msgDiv.className = 'msg';

if (isOwnMessage) {
msgDiv.classList.add('own-msg');
}

if (senderNick) {
const nickDiv = document.createElement('div');
nickDiv.style.fontWeight = '700';

if (senderNick.toLowerCase() === 'piar') {
nickDiv.style.color = '#00e5ff';
} else if (senderNick.toLowerCase() === 'sistem') {
nickDiv.style.color = '#ff0000';
} else if (senderNick.toLowerCase() === 'bless') {
nickDiv.style.color = '#f475ff';
} else {
nickDiv.style.color = '#ccc';
}

nickDiv.style.fontSize = '13px';
nickDiv.style.marginBottom = '2px';
nickDiv.innerText = senderNick;
msgDiv.appendChild(nickDiv);
}

// ✅ textDiv her zaman ekleniyor, if bloğunun dışında
const textDiv = document.createElement('div');
textDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
msgDiv.appendChild(textDiv);

chatArea.appendChild(msgDiv);
// ...geri kalanı aynı

while (chatArea.getElementsByClassName('msg').length > 200) {
chatArea.removeChild(chatArea.getElementsByClassName('msg')[0]);
}

setTimeout(() => {
chatArea.scrollTop = chatArea.scrollHeight;
}, 30);
}

function adjustInputHeight() {
messageInput.style.height = '50px';

if (messageInput.scrollHeight > 50) {
const newHeight = Math.min(150, messageInput.scrollHeight);
messageInput.style.height = newHeight + 'px';
}

const inputAreaHeight = inputArea.offsetHeight;
const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
const keyboardHeight = window.innerHeight - viewportHeight;

chatArea.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';
chatArea.scrollTop = chatArea.scrollHeight;
}

messageInput.addEventListener('input', adjustInputHeight);

messageInput.addEventListener('keydown', (event) => {
if (event.key === 'Enter') {
if (event.shiftKey) {
return;
} else {
event.preventDefault();

const textToSend = messageInput.value.trim();
const currentNick = nickInput.value.trim();

if (textToSend !== '') {
if (conn && conn.open) {
conn.send({
text: textToSend,
senderNick: currentNick
});
}

appendMessage(textToSend, currentNick, true);
messageInput.value = '';
adjustInputHeight();
}
}
}
});

document.addEventListener('keydown', (event) => {
if (event.key === 'Tab') {
if (messageInput.disabled) return;

const activeElement = document.activeElement;

if (event.shiftKey) {
if (activeElement === nickInput) {
event.preventDefault();
messageInput.focus();
}
} else {
if (activeElement === messageInput) {
event.preventDefault();
nickInput.focus();
}
}
}
});

if (window.visualViewport) {
window.visualViewport.addEventListener('resize', () => {
const viewportHeight = window.visualViewport.height;
const windowHeight = window.innerHeight;
const keyboardHeight = windowHeight - viewportHeight;

const inputAreaHeight = inputArea.offsetHeight;

if (keyboardHeight > 0) {
inputArea.style.bottom = keyboardHeight + 'px';
chatArea.style.bottom = (keyboardHeight + inputAreaHeight) + 'px';
} else {
inputArea.style.bottom = '0px';
chatArea.style.bottom = inputAreaHeight + 'px';
}

setTimeout(() => {
chatArea.scrollTop = chatArea.scrollHeight;
}, 30);
});
}
</script>
</body>
</html>
